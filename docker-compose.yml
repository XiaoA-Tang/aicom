services:
  app:
    build:
      context: .
    container_name: aicom-app
    env_file:
      - .env.production
    environment:
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    volumes:
      - aicom-data:/app/.data

volumes:
  aicom-data:
